"$schema" = "./node_modules/wrangler/config-schema.json"
name = "careersyncai"
main = "api/worker.ts"              # ← FIXED: Worker entry file, not HTML
compatibility_date = "2026-06-27"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = true

[assets]
directory = "./dist/public"         # ← FIXED: Vite outputs to dist/public/

[build]
command = "npm run build"

[route]
pattern = "careersyncai.sisaacson.io/*"
zone_name = "sisaacson.io"

# Non-sensitive config (these become plain text env vars in the Worker)
[vars]
APP_ID = ""
BASE_URL = "https://careersyncai.sisaacson.io"
ADMIN_SECRET_PATH = "/admin/login"
ADMIN_EMAILS = "scot@tsisaacson.io"
DATABASE_URL = "postgresql://postgres.ijcavxnozqxypbjsyzeq:woxUeiSRkGAtJDz1@aws-1-us-west-2.pooler.supabase.com:6543/postgres"
APP_SECRET = "jJKjtlbE38Yqb9lDazZBD7KdImoF3TWgF1w"


# Secrets should NOT be in wrangler.toml — set these via wrangler secret:
#   echo "value" | wrangler secret put NAME
#
# Required secrets:
#   APP_SECRET        - JWT signing secret (min 32 chars)
#   DATABASE_URL      - PostgreSQL connection string
#   RESEND_API_KEY    - Resend API key for email sending
#   FROM_EMAIL        - Sender email address
#   MOONSHOT_API_KEY  - Moonshot AI API key (optional)
