"$schema" = "./node_modules/wrangler/config-schema.json"
name = "careersyncai"
main = "api/worker.ts"              # ← FIXED: Worker entry file, not HTML
compatibility_date = "2026-06-27"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = true

[assets]
directory = "./dist/public"         # ← FIXED: Vite outputs to dist/public/

[build]
command = "npm run build"

[route]
pattern = "careersyncai.sisaacson.io/*"
zone_name = "sisaacson.io"

# Non-sensitive config
[vars]
APP_ID = ""
BASE_URL = "https://careersyncai.sisaacson.io"
ADMIN_SECRET_PATH = "/admin/login"
ADMIN_EMAILS = "scott@sisaacson.io"

# Secrets should NOT be in wrangler.toml — move these to wrangler secret:
# APP_SECRET, DATABASE_URL, RESEND_API_KEY, FROM_EMAIL, MOONSHOT_API_KEY