"$schema" = "./node_modules/wrangler/config-schema.json"
name = "careersyncai"
main = "dist/public/index.html"
# Set this to today's date
compatibility_date = "2026-06-27"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = true

# Add this:
[assets]
directory = "./dist"

[build]
command = "npm run build"

[route]
pattern = "careersyncai.sisaacson.io/*"
zone_name = "sisaacson.io"

# Cloudflare Workers environment variables (use wrangler secret for sensitive values)
